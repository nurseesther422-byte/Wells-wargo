<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu - Wells Fargo Credit Connect</title>
<link rel="stylesheet" href="dashboard.css">
</head>
<body>

  <div class="dashboard-page">

    <!-- Top Navigation -->
    <header class="top-nav">
      <div class="search-wrapper">
        <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
          <path fill="currentColor" d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 1 0-.7.7l.27.28v.79l5 4.99L20.49 19zm-6 0A4.5 4.5 0 1 1 14 9.5 4.5 4.5 0 0 1 9.5 14"/>
        </svg>
        <input type="text" class="search-input" placeholder="Ask Fargo" aria-label="Ask Fargo">
      </div>

      <div class="nav-right">
        <button class="icon-btn notification-btn" aria-label="Notifications">
          <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
            <path fill="currentColor" d="M12 22a2.5 2.5 0 0 0 2.45-2h-4.9A2.5 2.5 0 0 0 12 22m8-6v-5c0-3.53-2.61-6.43-6-6.92V3a2 2 0 0 0-4 0v1.08C6.61 4.57 4 7.47 4 11v5l-2 2v1h20v-1z"/>
          </svg>
          <span class="badge">9+</span>
        </button>

        <button id="signOffBtn" class="sign-off-btn">Sign Off</button>
      </div>
    </header>

    <main class="dashboard-content">

      <!-- Page Header -->
      <section class="page-header">
        <h1 class="page-title">Menu</h1>
        <p class="page-subtitle">Manage your profile, settings, and support.</p>
      </section>

      <!-- Profile -->
      <section class="section-card">
        <div class="profile-block">
          <div class="profile-avatar">S</div>
          <div>
            <p class="profile-name">Sophia Martin Rudolf</p>
            <p class="profile-email">soohia.martin@email.com</p>
          </div>
        </div>
      </section>

      <!-- Account settings -->
      <section class="section-card">
        <h2 class="section-title">Account</h2>
        <div class="row-list">
          <button class="menu-row" data-action="Profile & settings">
            <div class="menu-row-left">
              <span class="menu-row-icon">
                <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
                  <path fill="currentColor" d="M12 12a5 5 0 1 0 0-10 5 5 0 0 0 0 10m0 2c-4.42 0-8 2.24-8 5v1h16v-1c0-2.76-3.58-5-8-5"/>
                </svg>
              </span>
              <span class="menu-row-label">Profile &amp; settings</span>
            </div>
            <svg class="menu-row-chevron" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
              <path fill="currentColor" d="M9 6l6 6-6 6"/>
            </svg>
          </button>

          <button class="menu-row" data-action="Security & privacy">
            <div class="menu-row-left">
              <span class="menu-row-icon">
                <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
                  <path fill="currentColor" d="M12 2 4 5v6c0 5.55 3.84 10.74 8 12 4.16-1.26 8-6.45 8-12V5z"/>
                </svg>
              </span>
              <span class="menu-row-label">Security &amp; privacy</span>
            </div>
            <svg class="menu-row-chevron" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
              <path fill="currentColor" d="M9 6l6 6-6 6"/>
            </svg>
          </button>

          <button class="menu-row" data-action="Statements & documents">
            <div class="menu-row-left">
              <span class="menu-row-icon">
                <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
                  <path fill="currentColor" d="M6 2h9l5 5v13a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2m8 1.5V8h4.5z"/>
                </svg>
              </span>
              <span class="menu-row-label">Statements &amp; documents</span>
            </div>
            <svg class="menu-row-chevron" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
              <path fill="currentColor" d="M9 6l6 6-6 6"/>
            </svg>
          </button>

          <button class="menu-row" data-action="Notification preferences">
            <div class="menu-row-left">
              <span class="menu-row-icon">
                <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
                  <path fill="currentColor" d="M12 22a2.5 2.5 0 0 0 2.45-2h-4.9A2.5 2.5 0 0 0 12 22m8-6v-5c0-3.53-2.61-6.43-6-6.92V3a2 2 0 0 0-4 0v1.08C6.61 4.57 4 7.47 4 11v5l-2 2v1h20v-1z"/>
                </svg>
              </span>
              <span class="menu-row-label">Notification preferences</span>
            </div>
            <svg class="menu-row-chevron" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
              <path fill="currentColor" d="M9 6l6 6-6 6"/>
            </svg>
          </button>
        </div>
      </section>

      <!-- Support -->
      <section class="section-card">
        <h2 class="section-title">Support</h2>
        <div class="row-list">
          <button class="menu-row" data-action="Contact us">
            <div class="menu-row-left">
              <span class="menu-row-icon">
                <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
                  <path fill="currentColor" d="M20 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2m0 4-8 5-8-5V6l8 5 8-5z"/>
                </svg>
              </span>
              <span class="menu-row-label">Contact us</span>
            </div>
            <svg class="menu-row-chevron" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
              <path fill="currentColor" d="M9 6l6 6-6 6"/>
            </svg>
          </button>

          <button class="menu-row" data-action="Help center">
            <div class="menu-row-left">
              <span class="menu-row-icon">
                <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
                  <path fill="currentColor" d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20m1 15h-2v-2h2zm0-4h-2V7h2z"/>
                </svg>
              </span>
              <span class="menu-row-label">Help center</span>
            </div>
            <svg class="menu-row-chevron" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
              <path fill="currentColor" d="M9 6l6 6-6 6"/>
            </svg>
          </button>
        </div>
      </section>

    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
      <a href="dashboard.html" class="bottom-nav-item">
        <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
          <path fill="currentColor" d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
        </svg>
        <span>Home</span>
      </a>

      <a href="deposit.html" class="bottom-nav-item">
        <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
          <path fill="currentColor" d="M19 14V6a2 2 0 0 0-2-2H7a2 2 0 0 0-2 2v8H2l10 8 10-8zm-9 3.5L6.5 14H9V8h2v6h2.5z"/>
        </svg>
        <span>Deposit</span>
      </a>

      <a href="pay-transfer.html" class="bottom-nav-item">
        <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
          <path fill="currentColor" d="M9.01 14H2v2h7.01v3L13 15l-3.99-4zm5.98-1v-3H22V8h-7.01V5L11 9z"/>
        </svg>
        <span>Pay &amp; Transfer</span>
      </a>

      <a href="explore.html" class="bottom-nav-item">
        <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
          <path fill="currentColor" d="M12 10.9a1.1 1.1 0 1 0 0 2.2 1.1 1.1 0 0 0 0-2.2M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20m3.5 6.5-2 5.5-5.5 2 2-5.5z"/>
        </svg>
        <span>Explore</span>
      </a>

      <a href="menu.html" class="bottom-nav-item active" aria-current="page">
        <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
          <path fill="currentColor" d="M3 6h18v2H3zm0 5h18v2H3zm0 5h18v2H3z"/>
        </svg>
        <span>Menu</span>
      </a>
    </nav>

  </div>

  <script src="nav.js"></script>
  <script src="menu.js"></script>
</body>
</html>
