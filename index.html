<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wells Fargo - Sign On</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Fixed Header -->
  <header class="app-header">
    <div class="header-bar">
      <span class="header-spacer" aria-hidden="true"></span>
      <span class="header-logo">WELLS FARGO</span>
      <button class="hamburger-btn" aria-label="Open menu">
        <svg viewBox="0 0 24 24" width="26" height="26" aria-hidden="true">
          <path fill="currentColor" d="M3 6h18v2H3zm0 5h18v2H3zm0 5h18v2H3z"/>
        </svg>
      </button>
    </div>
    <div class="header-gold-line"></div>
  </header>

  <main class="login-main">

    <h1 class="greeting">Good evening</h1>

    <form id="loginForm" class="login-form" novalidate>

      <div class="input-wrapper">
        <label for="username" class="visually-hidden">Username</label>
        <input
          type="text"
          id="username"
          name="username"
          class="rounded-input"
          placeholder="Username"
          autocomplete="username"
          required>
      </div>

      <div class="input-wrapper">
        <label for="password" class="visually-hidden">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          class="rounded-input password-input"
          placeholder="Password"
          autocomplete="current-password"
          required>
        <button type="button" id="showPasswordBtn" class="show-btn">Show</button>
      </div>

      <p id="errorMessage" class="error-message" aria-live="polite"></p>

      <label class="save-username-row" for="saveUsername">
        <input type="checkbox" id="saveUsername" class="checkbox-input">
        <span class="save-username-text">Save username</span>
      </label>

      <p class="security-text">To help keep your account secure, save your username only on devices that aren't used by other people.</p>

      <button type="submit" id="signOnBtn" class="sign-on-pill" disabled>Sign on</button>

      <div class="divider-row">
        <span class="divider-text">or</span>
      </div>

      <button type="button" class="passkey-btn">
        <svg class="passkey-icon" viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
          <path fill="currentColor" d="M9 2a4 4 0 0 0-4 4 4 4 0 0 0 2.2 3.57L3 14.87V17h2v-2h2v-2h2l1.24-1.24A4 4 0 0 0 9 2m0 2a2 2 0 1 1 0 4 2 2 0 0 1 0-4"/>
          <path fill="currentColor" d="M14 17h7v2h-7z"/>
        </svg>
        <span class="passkey-text">Use a passkey</span>
      </button>

      <p class="passkey-description">Don't have one? Create a passkey after signing on and skip the password next time.</p>

    </form>

    <a href="#" class="forgot-link">
      <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
        <path fill="currentColor" d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20z"/>
      </svg>
      <span>Forgot username or password?</span>
    </a>

  </main>

  <script src="login.js"></script>
</body>
</html>
